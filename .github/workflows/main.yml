name: Linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: debian
            buildsystem: autotools
            tests: unit
            omemo: signal
            script: ./scripts/build-configuration-matrix.sh
          - flavor: fedora
            buildsystem: autotools
            tests: unit
            omemo: signal
            script: ./scripts/build-configuration-matrix.sh
          - flavor: ubuntu
            buildsystem: autotools
            tests: unit
            omemo: signal
            script: ./scripts/build-configuration-matrix.sh
          - flavor: debian
            buildsystem: meson
            tests: unit
            omemo: signal
            script: ./ci/ci-meson-build.sh
            omemo_env: libsignal
          - flavor: debian
            buildsystem: meson
            tests: unit
            omemo: libomemo
            script: ./ci/ci-meson-build.sh
            omemo_env: libomemo-c

    name: ${{ matrix.flavor }} | ${{ matrix.buildsystem }} | ${{ matrix.tests }} | ${{ matrix.omemo }}
    steps:
      - uses: actions/checkout@v2
      - name: Run tests
        env:
          OMEMO_BACKEND: ${{ matrix.omemo_env }}
        run: |
          docker build -f ci/Dockerfile.${{ matrix.flavor }} -t profanity .
          docker run ${OMEMO_BACKEND:+ -e OMEMO_BACKEND} profanity ${{ matrix.script }}
